<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar</title>
    <link rel="stylesheet" href="script.css">
    <link href="https://googleapis.com" rel="stylesheet">

</head>
<body>  
    <center>

    <div class="datetime">
    <div id="time"></div>
    <div id="date"></div>    
</div>
<div id="location">Mumbai, India</div>

        <h2 font="Alegbrian">JARVIS X</h2>
        <h5>YOUR INTELLIGENT ASSISTANT</h5>
    </center>

    <center height="100px" width="100%">         
        <div class="navbar" >
            <button class="nav-btn">Overview</button>
            <button class="nav-btn">System</button>  
            <button class="nav-btn">Agent</button>
            <button class="nav-btn">Tools</button>
            <button class="nav-btn">Automation</button>
            <button class="nav-btn">Settings</button>
                        
        </div>
</div>

<script>
function updateClock() {
    const now = new Date();

    const time = now.toLocaleTimeString("en-US", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
    });

    const date = now.toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
    });

    document.getElementById("time").innerHTML = time;
    document.getElementById("date").innerHTML = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
